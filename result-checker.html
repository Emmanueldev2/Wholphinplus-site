<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Result Checker</title>
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .main-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 550px;
        }
        
        /* Left Side - School Info */
        .school-info {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .school-info::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            top: -100px;
            right: -100px;
        }
        
        .school-info::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            bottom: -50px;
            left: -50px;
        }
        
        .school-content {
            position: relative;
            z-index: 1;
        }
        
        .logo-container {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            padding: 10px;
        }
        
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .school-content h1 {
            font-size: 28px;
            margin-bottom: 15px;
            line-height: 1.3;
        }
        
        .school-content .address {
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .school-content .motto {
            font-size: 16px;
            font-style: italic;
            opacity: 0.95;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.3);
        }
        
        /* Right Side - Form */
        .form-section {
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .form-header {
            margin-bottom: 40px;
        }
        
        .form-header h2 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .form-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
            font-family: 'Montserrat', sans-serif;
        }
        
        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }
        
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Montserrat', sans-serif;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .btn-secondary {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        
        .footer-note {
            margin-top: 25px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            
            .school-info {
                padding: 40px 30px;
                min-height: 300px;
            }
            
            .form-section {
                padding: 40px 30px;
            }
            
            .school-content h1 {
                font-size: 24px;
            }
            
            .form-header h2 {
                font-size: 24px;
            }
        }
    </style>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="main-container">
        <!-- Left Side - School Info -->
        <div class="school-info">
         <div class="school-content">
         <div class="logo-container">
                <img src="#" alt="School Logo">
         </div>
             <h1>Wholphinplus Developers Institute</h1>
              <p class="address">
                    No. 1 Nkemba Street, Off Abak Road, Uyo,<br>
                    Akwa Ibom State
             </p>
                <p class="motto">"Stars of Greatness"</p>
         </div>
        </div>
        
        <!-- Right Side - Form -->
        <div class="form-section">
            <div class="form-header">
                <h2>CHECK YOUR RESULTS</h2>
                <p>Kindly enter your admission number to view your results</p>
            </div>
            
            <form action="/result" method="GET">
                <div class="form-group">
                    <label for="admission_no">Admission / Examination Number</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🎓</span>
                        <input 
                            type="text" 
                            id="admission_no" 
                            name="admission_no" 
                            placeholder="e.g., WDI012" 
                            required
                        >
                    </div>
                </div>
                
                <div class="actions">
                    <button type="submit" class="btn-primary">Check Result</button>
                    <button type="button" class="btn-secondary" onclick="window.location.href='/teacher/login'">Sign in as Teacher</button>
                </div>
            </form>
            
            <div class="footer-note">
                <p>&copy;Wholphinplus Developer Institute — Result Portal </p>
            </div>
        </div>
    </div>
    <script>
        let name = "Alice";
        console.log("Hello, " + name);

        function greet(user) {
            alert("Welcome, " + user);
        }
        greet("Student");
    </script>
</body>

</html>
